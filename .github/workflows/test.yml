name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # TODO: Add Bun to the test matrix in a future PR (requires oven-sh/setup-bun action)
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test -- --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Check coverage threshold
        if: matrix.node-version == 22
        run: |
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const summary = JSON.parse(readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const total = summary.total;
            const lines = total.lines.pct;
            const branches = total.branches.pct;
            const functions = total.functions.pct;
            console.log('Coverage: lines=' + lines + '% branches=' + branches + '% functions=' + functions + '%');
            if (lines < 70 || branches < 60 || functions < 70) {
              console.error('Coverage below threshold!');
              process.exit(1);
            }
          "

      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=moderate
