name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same branch/PR — without this, stale runs
# can sit queued/running indefinitely (one run previously sat for 25 hours).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Skip husky's prepare-time hook install in CI (no commits happen here).
  HUSKY: 0

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Bundle size budget (size-limit)
        # Budgets live in .size-limit.mjs (~20% above measured). Run once.
        if: matrix.node-version == 22
        run: pnpm size

      - run: pnpm test -- --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Check coverage threshold
        if: matrix.node-version == 22
        run: |
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const summary = JSON.parse(readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const total = summary.total;
            const lines = total.lines.pct;
            const branches = total.branches.pct;
            const functions = total.functions.pct;
            console.log('Coverage: lines=' + lines + '% branches=' + branches + '% functions=' + functions + '%');
            if (lines < 55 || branches < 70 || functions < 70) {
              console.error('Coverage below threshold!');
              process.exit(1);
            }
          "

      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release surface
        run: pnpm assert:release-private

      - name: Lint (fail on errors only)
        run: npx biome check . --diagnostic-level=error

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=critical || true
        # Informational only: transitive dev-dep vulnerabilities (e.g., rollup
        # via vitest) are not runtime risks and frequently block CI. The audit
        # output is logged but does not fail the build.

  # Bun smoke test — verifies the framework runs on Bun
  test-bun:
    runs-on: ubuntu-latest
    # Backstop only; the run step self-bounds with `timeout` below.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run core tests with Bun (advisory)
        # ADVISORY, not blocking. vitest is the source of truth (the `test`
        # job above runs the full suite on Node 20/22 and gates the pipeline).
        # `bun test` uses Bun's own runner, whose vitest-compat layer does not
        # implement some APIs the suite relies on (e.g. `vi.setSystemTime` in
        # cron.test.ts) and handles real-server test lifecycle differently
        # (some serve tests keep the loop alive). Until those are reconciled
        # for Bun's runner, this job provides signal without gating releases.
        continue-on-error: true
        env:
          NODE_ENV: development
        # Self-bounded and always-succeeds: vitest is the gate, so a Bun-runner
        # hang or failure must never cancel the run or stall the pipeline.
        run: |
          cd packages/core
          # -k 30: if bun ignores SIGTERM at 300s (a hung event loop from a
          # real-server test), SIGKILL it 30s later so the step always returns.
          timeout -k 30 300 bun test || echo "::warning::bun test failed or exceeded its 5m budget (advisory; vitest on Node is authoritative)"

  # Deno smoke test — verifies the Deno adapter type-checks under Deno
  test-deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Build so @celsian/core is compiled and resolvable via node_modules.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Smoke-test the Deno adapter under Deno
        # Real runtime check (not a no-op): loads @celsian/core + the built adapter under
        # Deno, builds an app, and serves a Request->Response. Stronger than `deno check`
        # and avoids the Node-oriented d.ts type references. Needs `pnpm build` first.
        working-directory: packages/adapter-deno
        run: deno run -A deno-smoke.ts

  # workerd smoke test — boots the built @celsian/adapter-cloudflare in the
  # real workerd runtime via `wrangler dev` and asserts a 200 response.
  test-workerd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The smoke script runs wrangler via `npx --yes wrangler@4`; cache the
      # npm/npx download so repeat runs don't re-fetch workerd (~60 MB).
      - name: Cache npx wrangler
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npx-wrangler-4-${{ runner.os }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Smoke-test the Cloudflare adapter on workerd
        # Boots scripts/workerd-smoke-worker.mjs (real built dist of core +
        # adapter-cloudflare) on workerd and asserts GET /health -> 200.
        run: node scripts/workerd-smoke.mjs

  # Final gate — all required checks must pass before this reports success.
  # Use this as the single required status check in branch protection.
  ci-passed:
    if: always()
    needs: [test, lint, test-bun, test-deno, test-workerd]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ test failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ lint failed"
            exit 1
          fi
          # test-bun is advisory (Bun's test runner lacks some vitest APIs) —
          # surface its result but do not gate the pipeline on it.
          if [[ "${{ needs.test-bun.result }}" != "success" ]]; then
            echo "⚠️  test-bun did not pass (advisory, not blocking)"
          fi
          if [[ "${{ needs.test-deno.result }}" != "success" ]]; then
            echo "❌ test-deno failed"
            exit 1
          fi
          if [[ "${{ needs.test-workerd.result }}" != "success" ]]; then
            echo "❌ test-workerd failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
