name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Skip husky's prepare-time hook install in CI; the changesets action
  # creates commits and must not run the local pre-commit hook.
  HUSKY: 0

jobs:
  # Gate: run the full test suite before any release happens
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify publish surface and packed packages
        run: pnpm verify:publish

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # REQUIRED for provenance. The `--provenance` CLI flag on
          # `changeset publish` is silently ignored (changesets does not pass
          # it through to `npm publish`) — 0.5.0/0.5.1 shipped with ZERO
          # attestations despite the flag. npm DOES honor the equivalent
          # npm_config_* environment variable, so set it here. Requires the
          # `id-token: write` permission above — keep both together.
          NPM_CONFIG_PROVENANCE: true
