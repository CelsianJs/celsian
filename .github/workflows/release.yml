name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Skip husky's prepare-time hook install in CI; the changesets action
  # creates commits and must not run the local pre-commit hook.
  HUSKY: 0

jobs:
  # Gate: run the full test suite before any release happens
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify publish surface and packed packages
        run: pnpm verify:publish

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # REQUIRED for provenance. `changeset publish` has NO `--provenance`
          # flag — passing one now hard-errors ("Unknown flag for publish:
          # --provenance") and fails the whole release, so the `release` script
          # must NOT pass it. npm DOES honor the equivalent npm_config_*
          # environment variable, so provenance is enabled here instead.
          # Requires the `id-token: write` permission above — keep both together.
          NPM_CONFIG_PROVENANCE: true

      - name: Verify npm registry packages
        if: steps.changesets.outputs.published == 'true'
        run: pnpm verify:registry

      - name: Upload registry smoke artifact
        if: ${{ always() && steps.changesets.outputs.published == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: celsian-registry-smoke
          path: artifacts/registry-smoke.json
          if-no-files-found: error
