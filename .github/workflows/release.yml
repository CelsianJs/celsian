name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm assert:release-private
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint:ci
      - run: pnpm test
      - run: pnpm audit:release

      - name: Verify no workspace:* in published packages
        run: bash scripts/verify-publish.sh

      - name: Publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages from npm
        if: steps.changesets.outputs.published == 'true'
        run: pnpm verify:registry

      - name: Upload registry smoke artifact
        if: ${{ steps.changesets.outputs.published == 'true' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: celsian-registry-smoke
          path: artifacts/registry-smoke.json
          if-no-files-found: error
